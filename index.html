<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nudes de Garotas Jovens</title><style>


/* ────────────────────────*/
/* ===== BASE ===== */
/* ────────────────────────*/
body {
  margin:0;
  background:linear-gradient(180deg,#111,#1a1a1a);
  font-family:Arial;
  color:white;
}

.app {
  max-width:520px;
  margin:0 auto;
  min-height:100vh;
  background:#202020;
  box-shadow:0 0 60px rgba(0,0,0,0.9);
}

/* ────────────────────────*/
/* ===== HEADER AVANÇADO ===== */
/* ────────────────────────*/
.header {
  position:center;   /*sticky*/
  top:0;
  background:linear-gradient(180deg,rgba(32,32,32,0.95),rgba(32,32,32,0.7));
  backdrop-filter:blur(15px);
  padding:20px 16px 14px;
  z-index:10;
  border-bottom:1px solid rgba(255,255,255,0.05);
  border-radius: 8px;
  border: 0px solid #FFEE8C;*/
  height: 100px;
}

.top {
  display:flex;
  align-items:center;
  gap:12px;
}

.perfil {
  width:52px;
  height:52px;
  border-radius:50%;
  border:2px solid #FFEE8C;
  object-fit:cover;
}

.titulo {
  color:#FFEE8C;
  font-size:18px;
  font-weight:bold;
}

.descricao {
  font-size:12px;
  color:#aaa;
  margin-top:2px;
}

.subinfo {
  font-size:11px;
  color:#666;
  margin-top:4px;
}

/* ────────────────────────*/
/* ===== SEARCH MELHORADO ===== */
/* ────────────────────────*/
.search-box {
  margin-top:12px;
}

.search {
  width:95%;
  padding:11px 12px;
  border-radius:12px;
  border:none;
  background:#111;
  color:white;
  outline:none;
  font-size:14px;
  border:0.1px solid #FFEE8C;
}

.search::placeholder {
  color:#666;
}

/* ────────────────────────*/
/* ===== GALERIA ===== */
/* ────────────────────────*/
.galeria {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

.item {
  border-radius:16px;
  overflow:hidden;
  background:#000;
  position:relative;
  cursor:pointer;
  transition:0.25s;
}

.item:hover {
  transform:scale(1.03);
}

.item img, .item video {
  width:100%;
  height:100%;
  object-fit:cover;
}

.video-icon {
  position:absolute;
  bottom:8px;
  right:8px;
  background:rgba(0,0,0,0.7);
  padding:4px 7px;
  border-radius:8px;
  font-size:10px;
  color:#FFEE8C;
}

/* ────────────────────────*/
/* ===== ANIMAÇÃO ===== */
/* ────────────────────────*/
.hidden {
  opacity:0;
  transform:translateY(25px);
  transition:all 0.5s ease;
}

.show {
  opacity:1;
  transform:translateY(0);
}

/* ────────────────────────*/
/* ===== VIEWER ===== */
/* ────────────────────────*/
.viewer {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.97);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.viewer.active {
  display:flex;
}

.viewer img, .viewer video {
  max-width:95%;
  max-height:85%;
  border-radius:12px;
}

.contador {
  position:absolute;
  top:15px;
  right:15px;
  color:#FFEE8C;
  font-size:13px;
}

.hint {
  margin-top:12px;
  font-size:12px;
  color:#888;
}

</style></head><body><div class="app">  <!-- HEADER -->  <div class="header"><div class="top">
    
    
    <!-- ──────────────────────── -->
    <!-- ===== Foto do perfil =====    -->
    <!-- ──────────────────────── -->
  <img class="perfil" src="https://raw.githubusercontent.com/sangonomiapk-debug/Meus-Nudes/main/Nudes%207.jpeg">
  <div>
    
    
    
    <div class="titulo">Nudes vazados</div>
    <div class="descricao">Coleção visual refinada • Fotos & Vídeos</div>
    <div class="subinfo">Explore, pesquise e visualize em tela cheia</div>
  </div>
</div>

<div class="search-box">
  <input class="search" id="search" placeholder="Buscar número (ex: 1 a 31)...">
</div>

  </div>  <!-- GALERIA -->  <div class="galeria" id="galeria"></div></div><!-- VIEWER --><div class="viewer" id="viewer">
  <div class="contador" id="contador"></div>
  <img id="viewerImg" style="display:none">
  <video id="viewerVideo" controls style="display:none"></video>
  <div class="hint">Toque para fechar</div>
</div><script>



// ────────────────────────
// ===== ELEMENTOS =====
// ────────────────────────

const galeria = document.getElementById("galeria");
const viewer = document.getElementById("viewer");
const viewerImg = document.getElementById("viewerImg");
const viewerVideo = document.getElementById("viewerVideo");
const contador = document.getElementById("contador");
const search = document.getElementById("search");




// ────────────────────────
// ===== BASE DE DADOS =====
// ────────────────────────

const midias = [];

const base1 = "https://raw.githubusercontent.com/sangonomiapk-debug/Meus-Nudes/main/";
for (let i = 1; i <= 31; i++) {
  midias.push({ tipo:"img", src:`${base1}Nudes%20${i}.jpeg`, nome:`Nude ${i}` });
}





// ────────────────────────
// ===== EXEMPLO VIDEO =====
// ────────────────────────

// Link direto
// midias.push({ tipo:"video", src:"SEU_LINK_AQUI.mp4", nome:"Video 1" });



// ────────────────────────
// ===== GERAR GALERIA =====
// ────────────────────────

midias.forEach((m,index)=>{

  const div = document.createElement("div");
  div.className = "item hidden";

  let el;

  if(m.tipo === "img"){
    el = document.createElement("img");
    el.src = m.src;
  } else {
    el = document.createElement("video");
    el.src = m.src;
    el.muted = true;

    const icon = document.createElement("div");
    icon.className = "video-icon";
    icon.innerText = "VIDEO";
    div.appendChild(icon);
  }

  el.onclick = ()=>abrir(m,index);

  div.appendChild(el);
  galeria.appendChild(div);
});






// ────────────────────────
// ===== ABRIR MIDIA =====
// ────────────────────────

function abrir(m,index){
  viewer.classList.add("active");
  contador.textContent = m.nome;

  if(m.tipo === "img"){
    viewerImg.style.display = "block";
    viewerVideo.style.display = "none";
    viewerImg.src = m.src;
  } else {
    viewerImg.style.display = "none";
    viewerVideo.style.display = "block";
    viewerVideo.src = m.src;
    viewerVideo.play();
  }
}

viewer.onclick = ()=>{
  viewer.classList.remove("active");
  viewerVideo.pause();
};





// ────────────────────────
// ===== SEARCH INTELIGENTE =====
// ────────────────────────

search.addEventListener("input", ()=>{
  const valor = search.value.trim().toLowerCase();

  if(valor === "") return;

  const resultado = midias.find(m => m.nome.toLowerCase().includes(valor));

  if(resultado){
    abrir(resultado, midias.indexOf(resultado));
  }
});






// ────────────────────────
// ===== ANIMAÇÃO =====
// ────────────────────────

const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

window.onload = ()=>{
  document.querySelectorAll(".hidden").forEach(el=>observer.observe(el));
};

</script></body>
</html>
